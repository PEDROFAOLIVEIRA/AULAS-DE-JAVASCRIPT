<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Exercício 3</h1>
    <p>Conversão string em number</p>
    <script>
        var n1 = Number(window.prompt('Digite um número: '));
        var n2 = Number(window.prompt('Digite o segundo número: '));
        var resultado = n1 + n2
        window.alert('A soma do ' + n1 + ' + ' + n2 + ' é igual a: ' + resultado);
    </script>
    
</body>
